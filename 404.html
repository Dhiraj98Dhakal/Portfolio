<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Access Denied</title>
    
    <!-- Prevent Google Password Manager from triggering -->
    <meta name="google" content="notranslate">
    <meta name="password" content="disabled">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            animation: fadeIn 0.5s ease;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-lock {
            font-size: 4rem;
            color: #667eea;
            margin-bottom: 20px;
            background: rgba(102,126,234,0.1);
            width: 100px;
            height: 100px;
            line-height: 100px;
            border-radius: 50%;
            margin: 0 auto 20px;
            text-align: center;
        }

        h1 {
            font-size: 6rem;
            color: #667eea;
            margin-bottom: 10px;
            line-height: 1;
            text-shadow: 2px 2px 0 #764ba2;
            font-weight: 700;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .error-message {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
            font-size: 1.1rem;
        }

        .error-details {
            background: #f8fafc;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            color: #666;
            font-size: 0.9rem;
            border-left: 4px solid #667eea;
            text-align: left;
        }

        .error-details p {
            margin: 5px 0;
        }

        .error-details i {
            color: #667eea;
            margin-right: 10px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 30px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            min-width: 160px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102,126,234,0.4);
        }

        .btn-secondary {
            background: #f0f2f5;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e1e4e8;
            transform: translateY(-3px);
        }

        .redirect-message {
            margin-top: 30px;
            color: #999;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .timer {
            background: #667eea;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 1rem;
        }

        .footer-note {
            margin-top: 20px;
            color: #aaa;
            font-size: 0.8rem;
            border-top: 1px solid #f0f0f0;
            padding-top: 20px;
        }

        .footer-note a {
            color: #667eea;
            text-decoration: none;
        }

        .footer-note a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-lock">🔒</div>
        <h1>404</h1>
        <h2>Access Denied</h2>
        
        <div class="error-message">
            You don't have permission to access this page.<br>
            Please login first to continue.
        </div>

        <div class="error-details" id="errorDetails">
            <p><i class="fas fa-info-circle"></i> <strong>Error:</strong> <span id="errorType">Invalid session</span></p>
            <p><i class="fas fa-clock"></i> <strong>Time:</strong> <span id="currentTime"></span></p>
        </div>

        <div class="button-group">
            <a href="/admin/index.html" class="btn btn-primary">
                <i class="fas fa-sign-in-alt"></i> Go to Login
            </a>
            <a href="/" class="btn btn-secondary">
                <i class="fas fa-home"></i> Back to Home
            </a>
        </div>

        <div class="redirect-message">
            <span>Redirecting to login in</span>
            <span class="timer" id="countdown">10</span>
            <span>seconds...</span>
        </div>

        <div class="footer-note">
            <p>This area is restricted. Please login with valid credentials.</p>
            <p><a href="/admin/index.html">Admin Login</a> | <a href="/">Home Page</a></p>
        </div>
    </div>

    <script>
        // Get error parameter from URL
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error') || 'unknown';
        
        // Display error type
        const errorTypeMap = {
            'invalid': 'Invalid session token',
            'expired': 'Session expired',
            'unauthorized': 'Unauthorized access',
            'unknown': 'Unknown error'
        };
        
        document.getElementById('errorType').textContent = errorTypeMap[error] || errorTypeMap.unknown;
        
        // Display current time
        const now = new Date();
        document.getElementById('currentTime').textContent = now.toLocaleString();

        // Auto redirect countdown
        let seconds = 10;
        const countdownEl = document.getElementById('countdown');
        
        const interval = setInterval(() => {
            seconds--;
            countdownEl.textContent = seconds;
            
            if (seconds <= 0) {
                clearInterval(interval);
                window.location.href = '/admin/index.html' + (error ? '?error=' + error : '');
            }
        }, 1000);

        // Prevent Google Password Manager from showing
        document.addEventListener('DOMContentLoaded', function() {
            // Remove any autocomplete attributes
            document.querySelectorAll('input').forEach(input => {
                input.setAttribute('autocomplete', 'off');
                input.setAttribute('readonly', true);
            });
        });
    </script>
</body>
</html>
