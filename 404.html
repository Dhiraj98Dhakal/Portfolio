<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #0a0a0f;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .container {
            text-align: center;
            background: #12121a;
            padding: 50px;
            border-radius: 20px;
            border: 2px solid #00f3ff;
        }
        h1 { font-size: 4rem; color: #00f3ff; margin: 0; }
        p { color: #c0c0ff; }
        .btn {
            display: inline-block; padding: 12px 30px;
            background: transparent; border: 2px solid #00f3ff;
            color: #00f3ff; text-decoration: none; margin-top: 20px;
        }
        .btn:hover { background: #00f3ff; color: #0a0a0f; }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>Page Not Found</p>
        <a href="/" class="btn">Go to Home</a>
    </div>
</body>
</html>
