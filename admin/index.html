<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #12121a;
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #00f3ff;
            width: 100%;
            max-width: 400px;
        }
        h2 { color: #00f3ff; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #c0c0ff; margin-bottom: 5px; }
        input {
            width: 100%; padding: 12px; background: #0a0a0f;
            border: 1px solid #00f3ff; color: white; border-radius: 5px;
        }
        button {
            width: 100%; padding: 12px; background: #00f3ff;
            color: #0a0a0f; border: none; font-size: 1rem;
            cursor: pointer; font-weight: 600; margin-top: 10px;
        }
        button:hover { background: #ff00c8; }
        .server-status {
            text-align: center; margin-bottom: 20px; padding: 10px;
            border: 1px solid #00f3ff33; border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Admin Login</h2>
        <div class="server-status" id="status">Checking server...</div>
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" value="admin" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" value="admin123" required>
            </div>
            <button type="submit">Login</button>
        </form>
    </div>
    <script>
        const API_URL = 'https://portfolio-xqwu.onrender.com/api';
        
        fetch(`${API_URL}/test`).then(r => {
            if(r.ok) document.getElementById('status').innerHTML = '✅ Server Connected';
            else document.getElementById('status').innerHTML = '❌ Server Disconnected';
        }).catch(() => document.getElementById('status').innerHTML = '❌ Server Disconnected');

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const res = await fetch(`${API_URL}/admin/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('adminToken', data.token);
                localStorage.setItem('adminLoginTime', Date.now());
                window.location.href = 'dashboard.html';
            } else {
                alert('Invalid credentials');
            }
        });
    </script>
</body>
</html>
